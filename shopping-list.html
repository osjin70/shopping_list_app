<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    @property --primary {
      syntax: '<color>';
      inherits: true;
      initial-value: oklch(55% 0.22 264deg);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      padding: 28px 28px 24px;
      color: #fff;

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      p {
        margin-top: 4px;
        font-size: 0.875rem;
        opacity: 0.85;
      }
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 20px 12px;

      input {
        flex: 1;
        padding: 10px 14px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;

        &:focus { border-color: var(--primary); }
      }

      button {
        padding: 10px 18px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        white-space: nowrap;

        &:hover { background: oklch(from var(--primary) calc(l - 0.07) c h); }
        &:active { transform: scale(0.97); }
      }
    }

    .stats {
      display: flex;
      gap: 16px;
      padding: 0 20px 12px;
      font-size: 0.8rem;
      color: #94a3b8;

      span { font-weight: 600; color: var(--primary); }
    }

    .divider { border: none; border-top: 1px solid #f1f5f9; }

    ul {
      list-style: none;
      padding: 8px 0 12px;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      padding: 32px 0;
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      transition: background 0.15s;

      &:hover { background: #f8fafc; }

      &.checked {
        .item-text {
          text-decoration: line-through;
          color: #94a3b8;
        }

        .checkbox {
          background: var(--primary);
          border-color: var(--primary);

          svg { display: block; }
        }
      }
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;

      &:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
      }

      svg { display: none; }
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1e293b;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;

      &:hover { color: #ef4444; background: color-mix(in oklch, #ef4444 10%, white); }
      &:focus-visible { outline: 2px solid #ef4444; outline-offset: 2px; }
    }

    .card-footer {
      padding: 12px 20px 20px;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: none;
      border: 1px solid #e2e8f0;
      color: #94a3b8;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;

      &:hover { border-color: #ef4444; color: #ef4444; background: color-mix(in oklch, #ef4444 10%, white); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>🛒 쇼핑 리스트</h1>
      <p>오늘 사야 할 것들을 기록해 보세요</p>
    </div>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="60" autocomplete="off" />
      <button type="button" id="addBtn">추가</button>
    </div>

    <div class="stats">
      총 <span id="totalCount">0</span>개 &nbsp;·&nbsp; 완료 <span id="doneCount">0</span>개
    </div>

    <hr class="divider" />

    <ul id="list" role="list" aria-label="쇼핑 목록">
      <li class="empty" id="emptyMsg">아직 아이템이 없어요 😊</li>
    </ul>

    <hr class="divider" />

    <div class="card-footer">
      <button type="button" class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    (() => {
      const input      = document.getElementById('itemInput');
      const list       = document.getElementById('list');
      const emptyMsg   = document.getElementById('emptyMsg');
      const totalCount = document.getElementById('totalCount');
      const doneCount  = document.getElementById('doneCount');

      let items = (() => {
        try { return JSON.parse(localStorage.getItem('shopping') || '[]'); }
        catch { return []; }
      })();

      render();

      document.getElementById('addBtn').addEventListener('click', addItem);
      document.getElementById('clearBtn').addEventListener('click', clearChecked);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

      list.addEventListener('click', e => {
        const li = e.target.closest('li[data-id]');
        if (!li) return;
        if (e.target.closest('.checkbox')) toggle(li.dataset.id);
        else if (e.target.closest('.delete-btn')) remove(li.dataset.id);
      });

      list.addEventListener('keydown', e => {
        if (e.key !== ' ') return;
        const checkbox = e.target.closest('.checkbox');
        if (!checkbox) return;
        e.preventDefault();
        const li = checkbox.closest('li[data-id]');
        if (li) toggle(li.dataset.id);
      });

      function addItem() {
        const text = input.value.trim();
        if (!text) return;
        items.push({ id: crypto.randomUUID(), text, checked: false });
        input.value = '';
        save(); render();
        input.focus();
      }

      function toggle(id) {
        items = items.map(i => i.id === id ? { ...i, checked: !i.checked } : i);
        save(); render();
      }

      function remove(id) {
        items = items.filter(i => i.id !== id);
        save(); render();
      }

      function clearChecked() {
        items = items.filter(i => !i.checked);
        save(); render();
      }

      function save() {
        try { localStorage.setItem('shopping', JSON.stringify(items)); }
        catch { /* localStorage 사용 불가 환경 */ }
      }

      function render() {
        emptyMsg.style.display = items.length === 0 ? '' : 'none';

        [...list.querySelectorAll('li[data-id]')].forEach(el => el.remove());

        items.forEach(item => {
          const li = document.createElement('li');
          li.dataset.id = item.id;
          if (item.checked) li.classList.add('checked');

          const labelId = `label-${item.id}`;

          const checkbox = document.createElement('div');
          checkbox.className = 'checkbox';
          checkbox.setAttribute('role', 'checkbox');
          checkbox.setAttribute('aria-checked', String(item.checked));
          checkbox.setAttribute('tabindex', '0');
          checkbox.setAttribute('aria-labelledby', labelId);
          checkbox.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>`;

          const span = document.createElement('span');
          span.className = 'item-text';
          span.id = labelId;
          span.textContent = item.text;

          const deleteBtn = document.createElement('button');
          deleteBtn.type = 'button';
          deleteBtn.className = 'delete-btn';
          deleteBtn.setAttribute('aria-label', `${item.text} 삭제`);
          deleteBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>`;

          li.append(checkbox, span, deleteBtn);
          list.appendChild(li);
        });

        totalCount.textContent = items.length;
        doneCount.textContent  = items.filter(i => i.checked).length;
      }
    })();
  </script>
</body>
</html>
